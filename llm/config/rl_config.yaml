# Minecraft RL Configuration

# Environment Configuration
environment:
  # Minecraft server connection
  host: localhost
  port: 25565
  username: RLBOT

  # World settings
  world_type: flat  # flat, normal, superflat
  game_mode: survival  # survival, creative
  difficulty: normal  # peaceful, easy, normal, hard

# RL Agent Configuration
agent:
  type: PPO  # PPO, DQN, A2C
  learning_rate: 0.0001  # Reduced from 0.0003 for more stability
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  entropy_coef: 0.05  # Reduced from 0.2 - less random exploration, more focused
  vf_coef: 0.5
  max_grad_norm: 0.5

  # Network architecture
  network:
    hidden_size: 512
    num_layers: 3
    activation: relu  # relu, tanh, leaky_relu

# Training Configuration
training:
  # AUTO-CURRICULUM: Agent discovers and learns ALL mechanics autonomously
  # No human-specified stages - agent sets its own learning goals
  auto_curriculum:
    enabled: true  # Use auto-curriculum instead of fixed stages
    # The agent will:
    # - Discover mechanics through exploration
    # - Track mastery level for each mechanic
    # - Set learning goals based on prerequisites
    # - Learn movement, mining, crafting, building, combat, survival automatically

  # INTRINSIC CURIOSITY: Self-motivated exploration
  # Agent is intrinsically motivated to explore and discover, no external rewards needed
  curiosity:
    enabled: true

    # Intrinsic Curiosity Module (ICM)
    icm_scale: 1.0  # Weight for curiosity reward
    icm_lr: 0.001  # Learning rate for ICM

    # Random Network Distillation (RND) - novelty bonus
    rnd_scale: 0.5  # Weight for novelty reward
    rnd_lr: 0.0001  # Learning rate for RND predictor

    # Count-based exploration
    count_scale: 0.1  # Weight for count-based bonus

  # EXTRINSIC REWARDS: Minimal external rewards
  # Most rewards come from intrinsic motivation, not hand-crafted rewards
  use_extrinsic_rewards: false  # Disable hand-crafted rewards, use intrinsic only

  # Training parameters
  total_timesteps: 50000000  # 50M steps for full autonomous learning
  batch_size: 256  # Larger batch for more stable learning
  n_steps: 8192  # More steps before update
  n_epochs: 10

  # Save frequency
  save_freq: 25000  # Save less frequently
  log_freq: 5000

# Memory Configuration
memory:
  # Short-term memory
  short_term:
    capacity: 1000
    context_window: 50

  # Long-term memory (SQLite)
  long_term:
    database_path: ./data/memories/minecraft_rl.db
    max_memories: 1000000
    retrieval_top_k: 10

  # Episodic memory
  episodic:
    max_episodes: 10000
    episode_length: 10000

  # Semantic memory
  semantic:
    embedding_model: all-MiniLM-L6-v2
    embedding_dim: 384

# Craft Discovery Configuration
craft_discovery:
  enabled: true
  max_experiments_per_episode: 50
  experiment_strategy: curiosity  # curiosity, random, guided

  # Recipe database
  database_path: ./data/discovered_recipes.json

  # Learning parameters
  learning_rate: 0.1
  confidence_threshold: 0.8
  success_bonus: 100
  failure_penalty: -5

# Reward Configuration
rewards:
  # NOTE: Passive survival rewards (health_bonus, food_bonus) have been REMOVED
  # The bot must EARN rewards through actions (mining, crafting, exploring)

  # Progression rewards (action-based only!)
  block_mined: 5.0  # Increased - mining is critical!
  mining_attempt: 3.0  # Bonus just for trying to mine
  new_block_type: 50.0  # Big bonus for discovering new block
  item_crafted: 5.0  # Crafting is valuable
  new_craft_discovered: 50.0  # Significant bonus for new craft
  block_placed: 1.5  # Building

  # Exploration rewards
  distance_per_block: 2.0  # 2.0 per block traveled (INCREASED)
  new_chunk: 1  # Small bonus for new chunk
  new_biome: 10  # Bonus for new biome

  # Penalties
  damage_penalty: 5.0  # Per point of damage taken
  death_penalty: 100.0  # Death penalty
  time_penalty: -0.1  # Small penalty per step (encourage efficiency)

  # Episode completion rewards
  survival_bonus: 100  # Only if health > 10 at end
  building_bonus_medium: 50  # 20-50 blocks placed
  building_bonus_large: 100  # 50+ blocks placed
  mining_bonus_medium: 25  # 50-100 blocks mined
  mining_bonus_large: 50  # 100+ blocks mined
  crafting_bonus_small: 10  # Any crafting
  crafting_bonus_medium: 50  # 10+ items crafted
  crafting_bonus_large: 100  # 20+ items crafted
  discovery_bonus: 50  # 10+ new discoveries

# Observation Space
observation_space:
  # Position and movement
  position: true
  rotation: true
  velocity: true
  on_ground: true
  in_water: true
  health: true
  food: true
  saturation: true

  # Inventory
  inventory: true
  hotbar_selected: true

  # Vision
  visible_blocks: true
  visible_blocks_count: 100
  nearby_entities: true
  nearby_entities_count: 10

  # Environment
  time_of_day: true
  is_raining: true
  biome_id: true

  # Equipment
  held_item: true
  armor: true

# Action Space
action_space:
  discrete_actions: 50
  continuous_actions: true

# Bridge Configuration
bridge:
  # Communication
  protocol: websocket  # websocket, http
  host: localhost
  port: 8765

  # Timeouts
  action_timeout: 10  # seconds
  observation_timeout: 5  # seconds

# Logging Configuration
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  format: json  # json, text

  # TensorBoard
  tensorboard:
    enabled: true
    log_dir: ./data/logs/tensorboard

  # File logging
  file:
    enabled: true
    log_dir: ./data/logs
    max_size: 10MB
    backup_count: 5

# Model Checkpointing
checkpointing:
  save_dir: ./data/models
  save_frequency: 10000  # steps
  keep_last_n: 5
